# Execution environment (UAT,UAT2, prod)
env=UAT

# Application URL (RedBus website)
base.url=https://www.redbus.in

# Browser configuration (chrome, firefox, edge)
browser=chrome

# Implicit wait in seconds (applies globally to all elements)
# Explicit wait in seconds (used for dynamic waits like WebDriverWait)
# Maximum time to wait for page load
implicit.wait=10
explicit.wait=30
page.load.timeout=60

# Capture screenshot on test failure (true/false)
screenshot.on.failure=true

# Retry count for failed tests
retry.count=2